<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <link rel="icon"
        href="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Circle-icons-rocket.svg/960px-Circle-icons-rocket.svg.png">
    <title>Register</title>
</head>

<body>
    <div class="kosmo"></div>

    <section class="login-section">
        <div class="login-box">
            <h2>Utwórz konto</h2>
            <form class="register-form">
                <div class="input-box">
                    <input type="text" id="reg-username" placeholder="Nazwa użytkownika" required>
                </div>
                <div class="input-box">
                    <input type="email" id="reg-email" placeholder="Email" required>
                </div>
                <div class="input-box">
                    <input type="password" id="reg-password" placeholder="Hasło" required>
                </div>
                <div class="input-box">
                    <input type="password" id="reg-confirm" placeholder="Potwierdź hasło" required>
                </div>
                <button type="submit">Zarejestruj się</button>
            </form>
            <p style="margin-top:20px; color:white;">
                Masz już konto? <a href="login.html" style="color:#41BCE6;">Zaloguj się</a>
            </p>
        </div>
    </section>

    <script src="auth.js"></script>
</body>

</html>
